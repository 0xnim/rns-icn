[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "rns-icn"
version = "0.1.0"
description = "Information-Centric Networking for reticulum-py"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
where = ["."]
include = ["rns_icn*"]

[project.scripts]
icn-publish = "rns_icn.cli_publish:main"
icn-fetch = "rns_icn.cli_fetch:main"
